name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  POSTGRES_URL: "postgres://postgres:postgres@localhost:5432/postgres"
  BETTER_AUTH_SECRET: "ci-secret-key-not-for-production"
  BETTER_AUTH_URL: "http://localhost:3000"
  MCP_ENABLED: "true"

jobs:
  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Run database migrations
        run: cd backend && bunx prisma migrate deploy

      - name: Run tests
        run: bun --filter backend test

      - name: Run TypeScript build
        run: bun run build

  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run tests
        run: bun --filter frontend test

  deliver:
    name: Package delivery artifact
    needs: [validate-backend, validate-frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Assemble delivery bundle
        run: |
          mkdir -p delivery
          cp -R backend delivery/backend
          cp -R docs delivery/docs

          for file in README.md package.json bun.lock Dockerfile Dockerfile.dev Dockerfile.prod; do
            if [ -e "$file" ]; then
              cp "$file" delivery/
            fi
          done

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Run TypeScript build
        run: bun run build

      - name: Upload delivery bundle
        uses: actions/upload-artifact@v7
        with:
          name: backend-delivery-bundle
          path: delivery
          if-no-files-found: error
          retention-days: 14

  security:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Analyze code
        uses: github/codeql-action/analyze@v4
